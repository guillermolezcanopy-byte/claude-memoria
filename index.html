<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Fuego Cruzado · Desafíos para Parejas</title>
<style>
  :root {
    --bg1: #1a0710;
    --bg2: #2d0a1e;
    --accent: #ff2d55;
    --accent2: #ff7a59;
    --gold: #ffcf6b;
    --card: #fff6f2;
    --ink: #2a0512;
    --muted: #9b5a6e;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: #fff;
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(255,45,85,.35), transparent 60%),
      radial-gradient(1000px 700px at 90% 110%, rgba(255,122,89,.30), transparent 55%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    overflow: hidden;
  }

  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    max-width: 560px;
    margin: 0 auto;
    padding: env(safe-area-inset-top) 18px env(safe-area-inset-bottom);
  }

  /* ---------- Header ---------- */
  header {
    text-align: center;
    padding: 22px 0 6px;
  }
  header h1 {
    margin: 0;
    font-size: 30px;
    letter-spacing: .5px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--gold), var(--accent2), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header p {
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ---------- Screens ---------- */
  .screen { flex: 1; display: none; flex-direction: column; }
  .screen.active { display: flex; }

  /* ---------- Setup ---------- */
  #setup { justify-content: center; gap: 22px; }
  .panel {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(6px);
  }
  .panel h2 {
    margin: 0 0 14px;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold);
  }
  .levels { display: flex; flex-direction: column; gap: 10px; }
  .level {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,.12);
    cursor: pointer;
    transition: all .2s ease;
    background: rgba(0,0,0,.15);
    user-select: none;
  }
  .level .emoji { font-size: 26px; }
  .level .meta { flex: 1; }
  .level .name { font-weight: 700; font-size: 16px; }
  .level .desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .level .check {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.3);
    display: grid; place-items: center;
    font-size: 14px; color: transparent;
    transition: all .2s ease;
  }
  .level.on { border-color: var(--accent); background: rgba(255,45,85,.15); }
  .level.on .check { background: var(--accent); border-color: var(--accent); color: #fff; }

  .btn {
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: .5px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    box-shadow: 0 10px 30px rgba(255,45,85,.35);
    transition: transform .12s ease, opacity .2s;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
  .btn.ghost {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,.25);
    box-shadow: none;
    font-weight: 600;
  }

  /* ---------- Game ---------- */
  #game { justify-content: space-between; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 4px 0;
    font-size: 13px; color: var(--muted);
  }
  .topbar .pill {
    background: rgba(255,255,255,.08);
    padding: 6px 12px; border-radius: 999px;
    font-weight: 600; color: #fff;
  }

  .card-area {
    flex: 1;
    display: grid;
    place-items: center;
    perspective: 1500px;
    padding: 10px 0;
  }

  .card {
    width: 100%;
    max-width: 340px;
    aspect-ratio: 3/4.4;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .6s cubic-bezier(.2,.8,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 26px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
  }

  /* back */
  .face.back {
    background:
      radial-gradient(circle at 50% 30%, rgba(255,207,107,.25), transparent 60%),
      linear-gradient(160deg, #3a0c22, #6b1030);
    border: 2px solid rgba(255,207,107,.35);
    display: grid; place-items: center; text-align: center;
  }
  .face.back .logo { font-size: 64px; }
  .face.back .tag {
    margin-top: 10px; letter-spacing: 4px; font-size: 12px;
    text-transform: uppercase; color: var(--gold);
  }
  .face.back .hint { margin-top: 28px; font-size: 13px; color: rgba(255,255,255,.6); }

  /* front */
  .face.front {
    transform: rotateY(180deg);
    background: var(--card);
    color: var(--ink);
    display: flex; flex-direction: column;
    padding: 26px 24px;
  }
  .front .badge {
    align-self: flex-start;
    font-size: 12px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 12px; border-radius: 999px; color: #fff;
  }
  .front .num {
    position: absolute; top: 22px; right: 24px;
    font-size: 13px; font-weight: 700; color: var(--muted);
  }
  .front .body {
    flex: 1; display: flex; align-items: center;
  }
  .front .text {
    font-size: 22px; line-height: 1.35; font-weight: 600;
  }
  .front .foot {
    font-size: 12px; color: var(--muted); text-align: center;
    border-top: 1px dashed rgba(0,0,0,.12); padding-top: 12px;
  }

  .heat { display: inline-flex; gap: 2px; }

  .controls {
    display: flex; gap: 12px; padding: 4px 0 14px;
  }
  .controls .btn { flex: 1; }

  .empty {
    text-align: center; padding: 30px;
  }
  .empty h2 { color: var(--gold); }

  .fade { animation: fade .5s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px);} to {opacity:1; transform:none;} }

  footer {
    text-align: center; font-size: 11px; color: rgba(255,255,255,.3);
    padding: 4px 0 8px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Fuego Cruzado 🔥</h1>
    <p>Desafíos para parejas</p>
  </header>

  <!-- SETUP -->
  <section id="setup" class="screen active">
    <div class="panel">
      <h2>Elegí la intensidad</h2>
      <div class="levels" id="levels"></div>
    </div>
    <button class="btn" id="startBtn">Empezar a jugar</button>
    <p style="text-align:center;font-size:12px;color:var(--muted);margin:0">
      Solo para mayores de 18 · Todo se juega con consentimiento y entre risas 💋
    </p>
  </section>

  <!-- GAME -->
  <section id="game" class="screen">
    <div class="topbar">
      <span id="progress" class="pill">Carta 0/0</span>
      <span class="link" id="restart" style="cursor:pointer">↻ Reiniciar</span>
    </div>

    <div class="card-area">
      <div class="card" id="card">
        <div class="face back">
          <div>
            <div class="logo">🔥</div>
            <div class="tag">Fuego Cruzado</div>
            <div class="hint">Tocá para revelar</div>
          </div>
        </div>
        <div class="face front" id="front">
          <span class="badge" id="badge">Suave</span>
          <span class="num" id="num">#1</span>
          <div class="body"><div class="text" id="cardText">…</div></div>
          <div class="foot" id="cardFoot"></div>
        </div>
      </div>

      <div class="empty" id="empty" style="display:none">
        <h2>Se acabó el mazo 🥵</h2>
        <p style="color:var(--muted)">Espero que la hayan pasado bien…</p>
      </div>
    </div>

    <div class="controls">
      <button class="btn ghost" id="skipBtn">Saltar</button>
      <button class="btn" id="nextBtn">Siguiente carta</button>
    </div>
  </section>

  <footer>Hecho con 🔥 para disfrutar en pareja</footer>
</div>

<script src="cards.js"></script>
<script src="game.js"></script>
</body>
</html>
